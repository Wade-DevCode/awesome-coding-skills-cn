name: Validate catalog

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate catalog
        run: node scripts/build-catalog.mjs
      - name: Check CLI catalog output
        run: node scripts/check-cli-catalog.mjs
      - name: Check generated files are committed
        run: git diff --exit-code -- catalog.json catalog.md site/src/catalog.json
